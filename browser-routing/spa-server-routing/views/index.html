<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>SPA Server Routing</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				font-family: sans-serif;
				background-color: #f9f9f9;
				color: #333;
				min-height: 100vh;
				display: flex;
				flex-direction: column;
				align-items: center;
			}

			nav {
				background-color: #333;
				padding: 1rem 2rem;
				width: 100%;
				display: flex;
				justify-content: center;
				gap: 2rem;
			}

			nav a {
				color: #fff;
				text-decoration: none;
				font-weight: bold;
				transition: color 0.3s;
			}

			nav a:hover {
				color: #4caf50;
			}

			[data-link].active {
				color: #4caf50;
			}
		</style>
	</head>
	<body>
		<nav>
			<a href="/home" data-link>Home</a>
			<a href="/about" data-link>About</a>
			<a href="/contact" data-link>Contact</a>
		</nav>
		<div id="app"></div>
		<script>
			const routes = ["/", "/home", "/about", "/contact"];

			const render = () => {
				const path = location.pathname === "/" ? "/home" : location.pathname;
				const match = routes.find((r) => r === path);

				if (match) {
					fetch(`http://localhost:3001${path}`)
						.then((res) => {
							if (!res.ok) {
								throw new Error(`HTTP error! status: ${res.status}`);
							}
							return res.text();
						})
						.then((html) => {
							document.getElementById("app").innerHTML = html;
						})
						.catch((error) => {
							console.log("Failed to fetch HTML:", error);
						});
				} else {
					document.body.innerHTML = "<h1>404 - Page Not Found</h1>";
				}
				updateActiveLink();
			};

			const updateActiveLink = () => {
				const links = document.querySelectorAll("[data-link]");
				links.forEach((l) => l.classList.remove("active"));

				const effectivePath = location.pathname === "/" ? "/home" : location.pathname;

				const active = Array.from(links).find((l) => l.pathname === effectivePath);
				if (active) active.classList.add("active");
			};

			const navigate = (url) => {
				history.pushState(null, null, url);
				render();
			};

			document.addEventListener("DOMContentLoaded", render);
			document.addEventListener("click", (e) => {
				if (e.target.matches("[data-link]")) {
					e.preventDefault();
					navigate(e.target.href);
				}
			});

			window.addEventListener("popstate", render);
		</script>
	</body>
</html>
